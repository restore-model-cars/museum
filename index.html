<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<title>Encyclo-Track</title>


<style>

body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

/* header */

header{
position:absolute;
width:100%;
padding:20px;
text-align:center;
font-size:50px;
color:white;
font-weight:bold;
letter-spacing:2px;

}

/* hero image */

.hero{
height:100vh;
background-image:url("hero.jpg");
background-size:cover;
background-position:center;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

/* texte hero */

.hero h1{
font-size:30px;
margin:10px;
}

.hero p{
font-size:20px;
opacity:0.8;
}

/* bouton */

.button{
margin-top:500px;
padding:15px 40px;
border:2px solid white;
border-radius:40px;
text-decoration:none;
color:white;
transition:0.3s;
}

.button:hover{
background:white;
color:black;
}

/* sections */

.section{
padding:80px 10%;
text-align:center;
}

.circuits{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:40px;
margin-top:40px;
}

.card{
background:#121b2f;
padding:30px;
border-radius:15px;
transition:0.3s;
}

.card:hover{
transform:translateY(-10px);
}

footer{
padding:40px;
text-align:center;
opacity:0.5;
}

</style>
</head>

<body>

<header>
ENCYCLO-TRACK
</header>

<div class="hero">

<h1>L’empreinte du tracé</h1>

<p>
Géomatique • Histoire • Modélisme
</p>

<a class="button" href="#">
Explorer les circuits
</a>

</div>

<div class="section">

<h2>Circuits étudiés</h2>

<div class="circuits">

<div class="card">
<h3>Le Mans</h3>
<p>La naissance d’une légende</p>
</div>

<div class="card">
<h3>Albi</h3>
<p>Des Planques au Séquestre</p>
</div>

<div class="card">
<h3>Reims</h3>
<p>Histoire du circuit de Gueux</p>
</div>

</div>

</div>

<footer>

Projet Encyclo-Track

</footer>

</body>
</html>
