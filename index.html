<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotspots interactifs</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* HEADER */
header {
    background: #111;
    color: white;
    text-align: center;
    padding: 20px;
    font-size: 24px;
}

/* ZONE IMAGE */
.main {
    position: relative;
    height: 70vh;
    background: url('musée.png') center/cover no-repeat;
    overflow: hidden;
}

/* HOTSPOTS */
.hotspot {
    position: absolute;
    width: 40px;
    height: 40px;
    cursor: grab;
    transform: translate(-50%, -50%);
}

.hotspot img {
    width: 100%;
    height: 100%;
}

/* INFOBULLE */
.tooltip {
    position: absolute;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.8);
    color: white;
    padding: 6px 10px;
    border-radius: 6px;
    white-space: nowrap;
    font-size: 12px;
    opacity: 0;
    transition: 0.2s;
}

.hotspot:hover .tooltip {
    opacity: 1;
}

/* FOOTER */
footer {
    background: #111;
    color: white;
    text-align: center;
    padding: 15px;
}

/* RESPONSIVE */
@media (max-width: 600px) {
    header {
        font-size: 18px;
    }
}
</style>
</head>

<body>

<header>
    Model Cars Museum
</header>

<div class="main" id="zone">

    <!-- 8 HOTSPOTS -->
    <!-- Tu peux changer les positions (top/left) -->

    <div class="hotspot" style="top:20%; left:30%;">
        <img src="https://cdn-icons-png.flaticon.com/512/684/684908.png">
        <div class="tooltip">Voiture 1</div>
    </div>

    <div class="hotspot" style="top:40%; left:50%;">
        <img src="https://cdn-icons-png.flaticon.com/512/684/684908.png">
        <div class="tooltip">Voiture 2</div>
    </div>

    <div class="hotspot" style="top:60%; left:20%;">
        <img src="https://cdn-icons-png.flaticon.com/512/684/684908.png">
        <div class="tooltip">Voiture 3</div>
    </div>

    <div class="hotspot" style="top:30%; left:70%;">
        <img src="https://cdn-icons-png.flaticon.com/512/684/684908.png">
        <div class="tooltip">Voiture 4</div>
    </div>

    <div class="hotspot" style="top:50%; left:80%;">
        <img src="https://cdn-icons-png.flaticon.com/512/684/684908.png">
        <div class="tooltip">Voiture 5</div>
    </div>

    <div class="hotspot" style="top:70%; left:60%;">
        <img src="https://cdn-icons-png.flaticon.com/512/684/684908.png">
        <div class="tooltip">Voiture 6</div>
    </div>

    <div class="hotspot" style="top:80%; left:40%;">
        <img src="https://cdn-icons-png.flaticon.com/512/684/684908.png">
        <div class="tooltip">Voiture 7</div>
    </div>

    <div class="hotspot" style="top:25%; left:15%;">
        <img src="https://cdn-icons-png.flaticon.com/512/684/684908.png">
        <div class="tooltip">Voiture 8</div>
    </div>

</div>

<footer>
    © 2026 - Carte du Musée
</footer>

<script>
// DRAG & DROP DES HOTSPOTS
const hotspots = document.querySelectorAll('.hotspot');

hotspots.forEach(hotspot => {
    let isDragging = false;

    hotspot.addEventListener('mousedown', () => {
        isDragging = true;
        hotspot.style.cursor = 'grabbing';
    });

    document.addEventListener('mouseup', () => {
        isDragging = false;
        hotspot.style.cursor = 'grab';
    });

    document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;

        const parent = document.getElementById('zone');
        const rect = parent.getBoundingClientRect();

        let x = ((e.clientX - rect.left) / rect.width) * 100;
        let y = ((e.clientY - rect.top) / rect.height) * 100;

        hotspot.style.left = x + "%";
        hotspot.style.top = y + "%";
    });
});
</script>

</body>
</html>
