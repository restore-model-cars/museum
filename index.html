<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Model Cars Museum</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* HEADER */
header {
    background: #111;
    color: white;
    text-align: center;
    padding: 20px;
    background: url('logos.png') center/cover no-repeat;
}

/* MENU */
.menu {
    display: flex;
    justify-content: center;
    gap: 30px;
    background: #222;
    padding: 15px;
}

.menu a {
    color: white;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.menu a:hover {
    color: #e10600;
}

/* IMAGE */
.image-zone {
    position: relative;
    height: 70vh;
    background: url('musée.png') center/cover no-repeat;
}

/* BOUTONS */
.btn {
    position: absolute;
    transform: translate(-50%, -50%);
    padding: 10px 15px;
    background: rgba(0,0,0,0.75);
    color: white;
    text-decoration: none;
    border-radius: 20px;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    background: #e10600;
    transform: translate(-50%, -50%) scale(1.15);
}

/* FOOTER */
footer {
    background: #111;
    color: white;
    text-align: center;
    padding: 15px;
}

/* RESPONSIVE */
@media (max-width: 600px) {
    .menu {
        flex-direction: column;
        align-items: center;
    }
}
</style>
</head>

<body>

<header>
    <h1>Model Cars Museum</h1>
</header>

<nav class="menu">
    <a href="#">À propos</a>
    <a href="#">Facebook</a>
    <a href="#">Professeur Apex</a>
</nav>

<div class="image-zone">

    <!-- 10 BOUTONS FIXES -->
    <a href="#" class="btn" style="top:60%; left:35%;">F1</a>
    <a href="#" class="btn" style="top:30%; left:40%;">Circuit</a>
    <a href="#" class="btn" style="top:80%; left:20%;">Rally</a>
    <a href="#" class="btn" style="top:50%; left:65%;">Endurance</a>
    <a href="#" class="btn" style="top:80%; left:70%;">Routiére</a>
    <a href="#" class="btn" style="top:20%; left:60%;">Ateliers</a>
    <a href="#" class="btn" style="top:30%; left:80%;">Legos</a>
    
</div>

<footer>
    © 2026 - Model cars Museum | Projet personnel
</footer>

</body>
</html>
