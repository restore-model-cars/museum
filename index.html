<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Image + boutons positionnés</title>

  <style>
    /* Conteneur image */
    .container {
      position: relative;
      width: 100%;
      height: 100vh;
      background-image: url("musée.png");
      background-size: cover;
      background-position: center;
    }

    /* Style général des boutons */
    .btn {
      position: absolute;
      padding: 12px 20px;
      background-color: rgba(0, 0, 0, 0.6);
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 16px;
      transition: 0.3s;
    }

    .btn:hover {
      background-color: rgba(255, 255, 255, 0.8);
      color: black;
    }

    /* Positions personnalisées */
    .btn1 {
      top: 20%;
      left: 10%;
    }

    .btn2 {
      top: 50%;
      left: 40%;
    }

    .btn3 {
      top: 75%;
      left: 70%;
    }
      
    .btn4 {
      top: 35%;
      left: 70%;
    }
      
    .btn5 {
      top: 25%;
      left: 70%;
    }
      
    .btn6 {
      top: 15%;
      left: 70%;
    }
      
    .btn7 {
      top: 5%;
      left: 70%;
    }
  </style>
</head>

<body>

  <div class="container">

    <a href="page1.html" class="btn btn1">Salle des Formule 1</a>
    <a href="page2.html" class="btn btn2">Le monde du Rally</a>
    <a href="page3.html" class="btn btn3">Le mythe de l'endurance</a>
     <a href="page4.html" class="btn btn1">Le rêve des supercars</a>
    <a href="page5.html" class="btn btn2">L'ateliers</a>
    <a href="map.html" class="btn btn3">Les Circuits légendaires</a>
    <a href="page7.html" class="btn btn1">Pour les grands enfants</a>

  </div>

</body>
</html>
