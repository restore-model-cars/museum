<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon site</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background-color:#080c15; /* bleu nuit */
color:white;
}

/* bandeau du haut */
.banniere{
height:180px;
background-image:url("titre.png");
background-repeat: no-repeat ;   
background-size:center;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
}
/* texte du haut */
.texte-haut-gauche{
position:absolute;
top:20px;
left:20px;
color:white;
font-size:18px;
font-weight:bold;
}
/* bloc avec image de fond */
.bloc-image{
height:800px;
background-image:url("fond.png");
background-repeat: no-repeat round;  
background-size:80%;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
}

/* titre */
.banniere h1{
color:white;
font-size:40px;
background:rgba(0,0,0,00);
padding:10px 20px;
border-radius:8px;
}

  /* bouton */
.bouton-explorer{
position:absolute;
bottom:90px; /* distance du bas */
padding:12px 25px;
background-color:#ffffff;
color:#0b1d3a;
text-decoration:none;
font-weight:bold;
border-radius:5px;
}


</style>
</head>

<body>

<header class="banniere">
<h1></h1>
</header>

<div class="texte-haut-gauche">
Bienvenue dans l’univers d’Encyclo-Track.<br>
Plongez dans l’histoire des circuits automobiles,<br>
explorez leurs tracés et revivez la passion <br> du sport automobile à travers les époques.
</div>
<section class="bloc-image">
<a href="track.html" class="bouton-explorer">
Explorer les circuits
</a>
</section>

</body>
</html>
