
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Musée Miniature | Visite Virtuelle</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --bleu-nuit: #050b1a;
            --bleu-electrique: #00d4ff;
            --or-doux: #c5a358;
            --texte-gris: #a0adbd;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bleu-nuit);
            color: white;
            overflow-x: hidden;
        }

        /* Arrière-plan avec effet de grille futuriste */
        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #102a43 0%, #050b1a 100%);
            z-index: -1;
        }

        /* Header / Navigation */
        header {
            display: flex;
            justify-content: center;
            padding: 20px;
            background: rgba(5, 11, 26, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9em;
            transition: color 0.3s;
        }

        nav a:hover { color: var(--bleu-electrique); }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 40px 20px;
        }

        .logo-area {
            margin-bottom: 20px;
        }

        .logo-area h1 {
            font-size: 2.5em;
            letter-spacing: 4px;
            margin: 0;
            text-transform: uppercase;
            background: linear-gradient(to right, white, var(--bleu-electrique));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero h2 {
            font-size: 1.5em;
            color: var(--or-doux);
            text-transform: uppercase;
            font-weight: 300;
        }

        /* Conteneur de la Carte SIG */
        .map-container {
            width: 90%;
            max-width: 1100px;
            height: 600px;
            margin: 20px auto;
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 212, 255, 0.1);
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
            background: #050b1a; /* Fond de carte noir */
        }

        /* Style des Tooltips Leaflet (Popups) */
        .leaflet-tooltip-own {
            background: rgba(0, 20, 40, 0.9) !important;
            border: 1px solid var(--bleu-electrique) !important;
            color: white !important;
            border-radius: 5px;
            font-weight: bold;
        }

        .btn-visite {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 30px;
            border: 1px solid var(--bleu-electrique);
            color: var(--bleu-electrique);
            text-decoration: none;
            border-radius: 50px;
            transition: all 0.3s;
            background: rgba(0, 212, 255, 0.05);
        }

        .btn-visite:hover {
            background: var(--bleu-electrique);
            color: var(--bleu-nuit);
            box-shadow: 0 0 20px var(--bleu-electrique);
        }

    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <header>
        <nav>
            <a href="#">Accueil</a>
            <a href="#">F1</a>
            <a href="#">Rallye</a>
            <a href="#">Endurance</a>
            <a href="#">Civil</a>
            <a href="#">Circuits</a>
            <a href="#">Atelier</a>
        </nav>
    </header>

    <section class="hero">
        <div class="logo-area">
            <h1>Le Musée Miniature</h1>
            <h2>L'empreinte des légendes</h2>
        </div>
        <p style="color: var(--texte-gris); max-width: 600px; margin: 0 auto;">
            Explorez notre collection à travers cette interface cartographique interactive.
        </p>

        <div class="map-container">
            <div id="map"></div>
        </div>

        <a href="#map" class="btn-visite">Exploration Interactive des Salles</a>
    </section>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // Initialisation du SIG Web
        // On utilise L.CRS.Simple car c'est un plan de bâtiment, pas une carte du monde.
        var map = L.map('map', {
            crs: L.CRS.Simple,
            minZoom: -1,
            maxZoom: 2,
            attributionControl: false
        });

        // Définition des dimensions du plan (en pixels)
        var w = 1200, h = 800;
        var url = 'https://via.placeholder.com/1200x800/050b1a/00d4ff?text=PLAN+DU+MUSEE+STRUCTURE+3D'; // Remplacez par votre image de plan
        
        var southWest = map.unproject([0, h], map.getMaxZoom()-1);
        var northEast = map.unproject([w, 0], map.getMaxZoom()-1);
        var bounds = new L.LatLngBounds(southWest, northEast);

        // Ajout de l'image de fond
        L.imageOverlay(url, bounds).addTo(map);
        map.setMaxBounds(bounds);
        map.fitBounds(bounds);

        // Exemple de zones interactives (Salles)
        var zones = [
            { name: "Salle F1", color: "#ff0000", coords: [[-150, 100], [-150, 400], [-350, 400], [-350, 100]], link: "/f1" },
            { name: "Zone Rallye", color: "#00ff00", coords: [[-150, 450], [-150, 750], [-350, 750], [-350, 450]], link: "/rallye" },
            { name: "Atelier", color: "#ffa500", coords: [[-450, 800], [-450, 1100], [-650, 1100], [-650, 800]], link: "/atelier" }
        ];

        zones.forEach(function(zone) {
            var poly = L.polygon(zone.coords, {
                color: varProp('--bleu-electrique'),
                fillColor: zone.color,
                fillOpacity: 0.1,
                weight: 2
            }).addTo(map);

            poly.bindTooltip(zone.name, {
                permanent: false, 
                direction: "center",
                className: "leaflet-tooltip-own"
            });

            poly.on('mouseover', function() { this.setStyle({ fillOpacity: 0.4 }); });
            poly.on('mouseout', function() { this.setStyle({ fillOpacity: 0.1 }); });
            poly.on('click', function() { alert("Direction : " + zone.name); });
        });

        function varProp(name) {
            return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
        }
    </script>
</body>
</html>
