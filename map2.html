<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ma Carte Interactive</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0b1a2f; /* bleu nuit */
            color: #ffffff;
        }

        header {
            background-color: #102542;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
        }

        .btn-accueil {
            background-color: #1e3a5f;
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 5px;
        }

        .btn-accueil:hover {
            background-color: #2e5c8a;
        }

        .container {
            display: flex;
            height: calc(100vh - 140px);
        }

        .sidebar {
            width: 250px;
            background-color: #102542;
            padding: 15px;
            overflow-y: auto;
        }

        .map-container {
            position: relative;
            flex: 1;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Points cliquables sur la carte */
        .point {
            position: absolute;
            transform: translate(-50%, -50%);
        }

        .point a {
            background-color: #4da6ff;
            color: white;
            padding: 5px 8px;
            text-decoration: none;
            border-radius: 50%;
            font-size: 12px;
        }

        .point a:hover {
            background-color: #80c1ff;
        }

        footer {
            background-color: #102542;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>

<body>

<header>
    <h1>Carte du musée</h1>
    <button class="btn-accueil" onclick="alert('Retour accueil')">Accueil</button>
</header>

<div class="container">

    <div class="sidebar">
        <h2>Didacticiel</h2>
        <p>
            - Cliquez sur les points pour accéder aux informations.<br>
            - Naviguez dans la carte interactive.<br>
                 </p>
    </div>

    <div class="map-container">
        <!-- Intégration carte QGIS -->
        <iframe src="map.html"></iframe>

        <!-- Points cliquables (exemples) -->
        <div class="point" style="top: 40%; left: 50%;">
            <a href="https://example.com" target="_blank">1</a>
        </div>

        <div class="point" style="top: 60%; left: 30%;">
            <a href="https://example.com" target="_blank">2</a>
        </div>

        <div class="point" style="top: 70%; left: 70%;">
            <a href="https://example.com" target="_blank">3</a>
        </div>

    </div>

</div>

<footer>
    <p>© 2026 - Mon projet cartographique</p>
</footer>

</body>
</html>
