<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encyclo-Track | Atlas Mondial des Circuits</title>
    <style>
        :root {
            --dark-bg: #050a14; /* Bleu nuit profond comme l'accueil */
            --neon-blue: #00d4ff; /* Bleu néon technique */
            --neon-red: #ff3c3c; /* Rouge néon dynamique */
            --text-gray: #a0aec0;
            --marker-size: 20px;
        }

        body {
            background-color: var(--dark-bg);
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Pour garder la carte plein écran */
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header de la page */
        header {
            text-align: center;
            padding: 20px;
            border-bottom: 2px solid var(--neon-blue);
            background: rgba(5, 10, 20, 0.8);
            position: relative;
            z-index: 10;
        }

        h1 {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            letter-spacing: 3px;
            margin: 0;
            color: var(--neon-blue);
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        .subtitle {
            font-size: 1rem;
            color: var(--neon-red);
            margin: 5px 0 0 0;
        }

        /* Conteneur de la carte */
        .map-container {
            flex-grow: 1;
            position: relative;
            background: var(--dark-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Image de fond : Carte mondiale stylisée */
        /* Fond bleu nuit, continents aux contours blancs, inspiré de l'accueil */
        .world-map {
            width: 100%;
            height: 100%;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/e/eb/Carte_du_monde_vierge_%28Allemagnes_s%C3%A9par%C3%A9es%29.svg'); /* CARTE  (contours blancs, fond bleu nuit) */
            background-repeat: no-repeat;
            background-size: contain;
            background-position: center;
            opacity: 0.8; /* Légère transparence pour le style */
        }

        /* Style des points marker cliquables */
        .marker {
            position: absolute;
            width: var(--marker-size);
            height: var(--marker-size);
            background-color: var(--dark-bg);
            border: 2px solid var(--neon-blue);
            border-radius: 50%;
            cursor: pointer;
            transform: translate(-50%, -50%); /* Pour centrer le point */
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
            z-index: 5;
        }

        /* Effet au survol du point */
        .marker:hover {
            background-color: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.8);
            transform: translate(-50%, -50%) scale(1.2);
        }

        /* Label du continent au survol */
        .marker::after {
            content: attr(data-continent);
            position: absolute;
            bottom: 120%;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(5, 10, 20, 0.9);
            color: var(--neon-blue);
            padding: 5px 10px;
            border-radius: 4px;
            border: 1px solid var(--neon-blue);
            font-size: 0.8rem;
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease;
        }

        .marker:hover::after {
            opacity: 1;
            visibility: visible;
            
        }
          /* bouton */

        .button{
        position:absolute;
        top:50px;
        right:50px;
        padding:15px 40px;
        border:2px solid white;
        border-radius:40px;
        text-decoration:none;
        color:white;
        transition:0.3s;
        }
        button:hover{
        background:white;
        color:black;
        }


        /* Positionnement des points par continent */
        /* Ces coordonnées sont des approximations pour un SVG plein écran */
        #marker-europe { top: 25%; left: 45%; }
        #marker-africa { top: 55%; left: 45%; }
        #marker-asia { top: 35%; left: 65%; }
        #marker-america { top: 40%; left: 22%; }
        #marker-oceania { top: 75%; left: 72%; }

        /* Panneau d'information (caché par défaut) */
        #info-panel {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(10, 17, 34, 0.95);
            border: 2px solid var(--neon-blue);
            border-radius: 8px;
            padding: 15px;
            width: 80%;
            max-width: 400px;
            text-align: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
            z-index: 20;
        }

        #info-panel.visible {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(-10px);
        }

        #info-title {
            color: var(--neon-blue);
            margin: 0 0 10px 0;
            font-size: 1.2rem;
        }

        #info-text {
            color: var(--text-gray);
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .close-btn {
            position: absolute;
            top: 5px;
            right: 10px;
            color: var(--text-gray);
            cursor: pointer;
            font-size: 1.2rem;
        }

        .close-btn:hover { color: var(--neon-red); }

        .btn-link {
            display: inline-block;
            background: var(--neon-blue);
            color: var(--dark-bg);
            padding: 8px 15px;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.8rem;
        }

    </style>
</head>
    <p><a href="index.html"style="color:white;"<a class="button" >accueil</a></p>
<body>

<header>
    <h1>ENCYCLO-TRACK</h1>
    <p class="subtitle">ATLAS MONDIAL DES CIRCUITS</p>
    <p>Sélectionnez un continent pour explorer ses tracés légendaires.</p>
</header>

<div class="map-container">
    <div class="world-map"></div>

    <div class="marker" id="marker-europe" data-continent="Europe" onclick="showInfo('Europe')"></div>
    <div class="marker" id="marker-africa" data-continent="Afrique" onclick="showInfo('Afrique')"></div>
    <div class="marker" id="marker-asia" data-continent="Asie" onclick="showInfo('Asie')"></div>
    <div class="marker" id="marker-america" data-continent="Amérique" onclick="showInfo('Amérique')"></div>
    <div class="marker" id="marker-oceania" data-continent="Océanie" onclick="showInfo('Océanie')"></div>
</div>

<div id="info-panel">
    <span class="close-btn" onclick="hideInfo()">×</span>
    <h3 id="info-title">Continent</h3>
    <p id="info-text">Informations sur les circuits de ce continent.</p>
    <a href="#" class="btn-link" id="info-link">Explorer les tracés →</a>
</div>

<script>
    // Données temporaires pour l'interaction
    const continentData = {
        'Europe': {
            text: 'Le berceau du sport auto. Spa, Monza, Le Mans, Nürburgring...',
            link: 'europe' // Lien vers la page de ton site dédiée à l'Europe
        },
        'Afrique': {
            text: 'Kyalami, Circuit de Dakar Baobabs. Des tracés techniques sous le soleil.',
            link: 'afrique'
        },
        'Asie': {
            text: 'Suzuka, Sepang, Shanghai. L\'alliance de la technologie et de la précision.',
            link: 'asie'
        },
        'Amérique': {
            text: 'Sebring, Montréal, Interlagos, Buenos Aires. Vitesse et grand spectacle.',
            link: 'amerique'
        },
                'Océanie': {
            text: 'Mount Panorama (Bathurst), Albert Park. Le défi de la montagne et des parcs.',
            link: 'oceanie'
        }
    };

    const infoPanel = document.getElementById('info-panel');
    const infoTitle = document.getElementById('info-title');
    const infoText = document.getElementById('info-text');
    const infoLink = document.getElementById('info-link');

    // Fonction pour afficher le panneau d'info
    function showInfo(continent) {
        if (continentData[continent]) {
            infoTitle.innerText = continent;
            infoText.innerText = continentData[continent].text;
            infoLink.href = continentData[continent].link;
            infoPanel.classList.add('visible');
        }
    }

    // Fonction pour cacher le panneau d'info
    function hideInfo() {
        infoPanel.classList.remove('visible');
    }

    // Fermer le panneau si on clique en dehors
    document.querySelector('.world-map').addEventListener('click', hideInfo);
</script>

</body>
</html>
