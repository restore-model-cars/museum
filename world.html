<title>Les Circuits du Monde</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* HEADER */
header {
    background: #000000;
    color: white;
    text-align: center;
    padding: 20px;
    }

/* MENU */
.menu {
    display: flex;
    justify-content: center;
    gap: 30px;
    background: #000000;
    padding: 15px;
}

.menu a {
    color: white;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.menu a:hover {
    color: #e10600;
}
/* FENETRE */

.container{
width:150%;
height:80vh;
margin:auto;
border:2px solid #2bc4ff;
border-radius:10px;
overflow:hidden;
background: #000000;
}
/* IFRAME */

iframe{
width:200%;
height:100%;
border:none;
background: #000000;
}

/* BOUTONS */
.btn {
    position: absolute;
    transform: translate(-50%, -50%);
    padding: 10px 15px;
    background: rgba(0,0,0,0.75);
    color: white;
    text-decoration: none;
    border-radius: 20px;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    background: #e10600;
    transform: translate(-50%, -50%) scale(1.15);
}

/* FOOTER */
footer {
    background: #111;
    color: white;
    text-align: center;
    padding: 15px;
}

/* RESPONSIVE */
@media (max-width: 600px) {
    .menu {
        flex-direction: column;
        align-items: center;
    }
}
</style>
